<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recruitment ATS</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- Top Navigation Bar -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-400 flex items-center gap-2">
                <i class="fa-solid <i fa-robot"></i> AI-ATS Hub
            </h1>
            <div class="flex gap-2" id="job-tabs">
                <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition active-tab">
                    Software Engineer
                </button>
                <button onclick="addNewPosition()" class="bg-gray-700 hover:bg-gray-600 text-gray-200 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1">
                    <i class="fa-solid fa-plus"></i> Add Position
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- Left Column: Requirements & Email Config -->
        <section class="lg:col-span-1 space-y-6">
            <!-- Position Requirements Form -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h2 class="text-lg font-semibold text-indigo-300 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-list-check"></i> Job Requirements
                </h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="req-input" placeholder="e.g., 3+ years experience in React" 
                        class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-indigo-500">
                    <button onclick="addRequirement()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm font-medium transition">
                        Add
                    </button>
                </div>
                <ul id="req-list" class="space-y-2 max-h-48 overflow-y-auto pr-2">
                    <!-- Dynamic Requirements will appear here -->
                </ul>
            </div>

            <!-- Email Template Form -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h2 class="text-lg font-semibold text-emerald-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-envelope-open-text"></i> Interview Email Setup
                </h2>
                <div class="space-y-3 text-sm">
                    <div>
                        <label class="block text-gray-400 mb-1">Company Name</label>
                        <input type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Interview Location/Address</label>
                        <input type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-400 mb-1">Date</label>
                            <input type="date" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none text-gray-300">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Time</label>
                            <input type="time" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none text-gray-300">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Description (Optional)</label>
                        <textarea rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Column: Bulk Upload & CV Sorting Tabs -->
        <section class="lg:col-span-2 space-y-6">
            <!-- Bulk CV Upload Zone -->
            <div class="bg-gray-800 p-8 rounded-xl border-2 border-dashed border-gray-600 hover:border-indigo-500 transition text-center cursor-pointer shadow-xl relative">
                <input type="file" multiple accept=".pdf,.docx,image/*" class="absolute inset-0 opacity-0 cursor-pointer" id="cv-uploader">
                <i class="fa-solid fa-cloud-arrow-up text-4xl text-gray-400 mb-3"></i>
                <h3 class="text-lg font-medium text-gray-200">Drag & Drop CVs here</h3>
                <p class="text-xs text-gray-400 mt-1">Supports PDF, DOCX, and Images (Up to 300 files)</p>
            </div>

            <!-- Candidate Processing & Tabs -->
            <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
                <!-- Category Tab Buttons -->
                <div class="flex border-b border-gray-700 bg-gray-850">
                    <button class="flex-1 py-3 text-center border-b-2 border-emerald-500 text-emerald-400 font-medium text-sm flex justify-center items-center gap-2">
                        🟢 High <span class="bg-emerald-900 text-emerald-300 text-xs px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button class="flex-1 py-3 text-center border-b-2 border-transparent hover:text-amber-400 font-medium text-sm text-gray-400 flex justify-center items-center gap-2">
                        🟡 Medium <span class="bg-amber-900 text-amber-300 text-xs px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button class="flex-1 py-3 text-center border-b-2 border-transparent hover:text-rose-400 font-medium text-sm text-gray-400 flex justify-center items-center gap-2">
                        🔴 Low <span class="bg-rose-900 text-rose-300 text-xs px-2 py-0.5 rounded-full">0</span>
                    </button>
                    <button class="flex-1 py-3 text-center border-b-2 border-transparent hover:text-gray-300 font-medium text-sm text-gray-500 flex justify-center items-center gap-2">
                        🗑️ Recycle <span class="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-full">0</span>
                    </button>
                </div>

                <!-- Bulk Mail Action Bar -->
                <div class="p-4 bg-gray-850 border-b border-gray-700 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" class="rounded border-gray-600 bg-gray-700 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-xs text-gray-400">Select All Candidates</span>
                    </div>
                    <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg flex items-center gap-1 transition shadow-md">
                        <i class="fa-solid fa-paper-plane"></i> Send Auto Mail
                    </button>
                </div>

                <!-- Candidates List Container -->
                <div class="p-6 divide-y divide-gray-700 max-h-96 overflow-y-auto" id="candidates-list">
                    <!-- Sample Candidate Row -->
                    <div class="py-4 flex flex-col md:flex-row md:items-center justify-between gap-4 first:pt-0 last:pb-0">
                        <div>
                            <h4 class="font-semibold text-gray-200">John Doe</h4>
                            <p class="text-xs text-gray-400">johndoe@email.com • <span class="text-indigo-400">Match: 92%</span></p>
                        </div>
                        <div class="flex items-center gap-2 self-end md:self-auto">
                            <button class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-1.5 rounded border border-gray-600 flex items-center gap-1">
                                <i class="fa-solid fa-circle-question text-indigo-400"></i> AI Q&A
                            </button>
                            <button class="bg-emerald-600 hover:bg-emerald-700 text-xs px-3 py-1.5 rounded flex items-center gap-1 font-medium">
                                <i class="fa-solid fa-paper-plane"></i> Mail
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Simple JS for Basic Interactivity -->
    <script>
        function addRequirement() {
            const input = document.getElementById('req-input');
            const value = input.value.trim();
            if (value === "") return;

            const list = document.getElementById('req-list');
            const li = document.createElement('li');
            li.className = "bg-gray-700 px-3 py-2 rounded-lg text-sm flex justify-between items-center border border-gray-600";
            li.innerHTML = `<span>${value}</span>
                            <button onclick="this.parentElement.remove()" class="text-rose-400 hover:text-rose-500">
                                <i class="fa-solid fa-trash"></i>
                            </button>`;
            list.appendChild(li);
            input.value = "";
        }

        function addNewPosition() {
            alert("This will prompt to add a new isolated tab for another job post!");
        }
    </script>
</body>
</html>
