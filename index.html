<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recruitment ATS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-indigo-400 flex items-center gap-2">
                <i class="fa-solid fa-robot"></i> AI-ATS Hub
            </h1>
            <div class="flex flex-wrap gap-2 items-center" id="job-tabs-container">
                <div id="dynamic-tabs" class="flex gap-2">
                    </div>
                <button onclick="openPositionModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-1 shadow-md">
                    <i class="fa-solid fa-plus"></i> Add Position
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <section class="lg:col-span-1 space-y-6">
            <div class="bg-indigo-950/40 border border-indigo-800 p-4 rounded-xl flex justify-between items-center">
                <div>
                    <span class="text-xs text-indigo-400 font-bold uppercase">Active Position</span>
                    <h3 id="active-job-title" class="text-xl font-bold text-white mt-0.5">Software Engineer</h3>
                </div>
                <button onclick="deleteCurrentPosition()" class="text-rose-400 hover:text-rose-500 text-xs font-semibold flex items-center gap-1 bg-rose-950/40 px-2.5 py-1.5 rounded border border-rose-900 transition">
                    <i class="fa-solid fa-trash"></i> Delete Post
                </button>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl space-y-4">
                <h2 class="text-lg font-semibold text-indigo-300 border-b border-gray-700 pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-briefcase"></i> Position Details
                </h2>
                
                <div class="text-sm space-y-2.5" id="position-details-display">
                    </div>

                <div class="border-t border-gray-700 pt-3">
                    <label class="block text-xs font-bold text-amber-400 uppercase mb-1">Company Phone Number (For SMS)</label>
                    <input type="tel" id="company-phone" oninput="saveCompanyPhone()" placeholder="e.g., +88017XXXXXXXX" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-white">
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                <h2 class="text-lg font-semibold text-emerald-400 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-envelope-open-text"></i> Interview Email Setup
                </h2>
                <div class="space-y-3 text-sm">
                    <div>
                        <label class="block text-gray-400 mb-1">Company Name</label>
                        <input type="text" id="email-company" oninput="saveEmailData()" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none text-white">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Interview Location/Address</label>
                        <input type="text" id="email-address" oninput="saveEmailData()" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none text-white">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-400 mb-1">Date</label>
                            <input type="date" id="email-date" oninput="saveEmailData()" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none text-gray-300">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Time</label>
                            <input type="time" id="email-time" oninput="saveEmailData()" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none text-gray-300">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Message (Optional)</label>
                        <textarea id="email-desc" oninput="saveEmailData()" rows="2" placeholder="Any additional notes..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 focus:outline-none resize-none text-white"></textarea>
                    </div>
                </div>
            </div>
        </section>

        <section class="lg:col-span-2 space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border-2 border-dashed border-gray-600 hover:border-indigo-500 transition text-center cursor-pointer shadow-xl relative">
                <input type="file" multiple accept=".pdf,.docx,image/*,text/plain" class="absolute inset-0 opacity-0 cursor-pointer" id="cv-uploader" onchange="processCVCategoryWiselocal(event)">
                <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-400 mb-2"></i>
                <h3 class="text-base font-medium text-gray-200">Drag & Drop Candidate CVs</h3>
                <p class="text-xs text-gray-400 mt-0.5">Files will instantly segregate into categories below</p>
            </div>

            <div id="cv-preview-box" class="bg-gray-800 border border-indigo-900 rounded-xl p-4 shadow-xl hidden">
                <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-3">
                    <h3 class="text-sm font-bold text-indigo-400 flex items-center gap-1.5"><i class="fa-solid fa-file-lines"></i> CV Viewer: <span id="preview-cv-name" class="text-white"></span></h3>
                    <button onclick="closePreview()" class="text-gray-400 hover:text-white text-xs bg-gray-700 px-2 py-1 rounded">Hide Preview</button>
                </div>
                <div id="preview-body-content" class="bg-gray-950 p-3 rounded font-mono text-xs max-h-40 overflow-y-auto text-gray-300 whitespace-pre-wrap"></div>
            </div>

            <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
                <div class="flex border-b border-gray-700 bg-gray-850">
                    <button onclick="switchCategory('high')" id="tab-high" class="flex-1 py-3 text-center border-b-2 border-emerald-500 text-emerald-400 font-medium text-xs flex justify-center items-center gap-1.5">
                        🟢 High <span id="count-high" class="bg-emerald-900 text-emerald-300 text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                    <button onclick="switchCategory('medium')" id="tab-medium" class="flex-1 py-3 text-center border-b-2 border-transparent text-gray-400 font-medium text-xs flex justify-center items-center gap-1.5">
                        🟡 Minimum <span id="count-medium" class="bg-amber-900 text-amber-300 text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                    <button onclick="switchCategory('low')" id="tab-low" class="flex-1 py-3 text-center border-b-2 border-transparent text-gray-400 font-medium text-xs flex justify-center items-center gap-1.5">
                        🔴 Low <span id="count-low" class="bg-rose-900 text-rose-300 text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                    <button onclick="switchCategory('recycle')" id="tab-recycle" class="flex-1 py-3 text-center border-b-2 border-transparent text-gray-500 font-medium text-xs flex justify-center items-center gap-1.5">
                        🗑️ Recycle <span id="count-recycle" class="bg-gray-700 text-gray-300 text-[10px] px-1.5 py-0.5 rounded-full">0</span>
                    </button>
                </div>

                <div class="p-4 divide-y divide-gray-700 max-h-[450px] overflow-y-auto" id="candidates-list"></div>
            </div>
        </section>
    </main>

    <div id="position-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl p-6 space-y-4">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                <h3 class="text-xl font-bold text-indigo-400"><i class="fa-solid fa-folder-plus"></i> Create New Position</h3>
                <button onclick="closePositionModal()" class="text-gray-400 hover:text-white text-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="position-form" onsubmit="handleModalSubmit(event)" class="space-y-3 text-sm">
                <div>
                    <label class="block text-gray-400 mb-1">Post Name *</label>
                    <input type="text" id="m-post-name" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Job Description</label>
                    <textarea id="m-job-desc" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Education Requirements</label>
                    <input type="text" id="m-education" placeholder="e.g., BSc / Diploma / Masters" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-gray-400 mb-1">Age Limit</label>
                        <input type="text" id="m-age" placeholder="e.g., 20-30" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Experience Required</label>
                        <input type="text" id="m-exp" placeholder="e.g., 1+ Year" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-gray-400 mb-1">Skills Requirements</label>
                    <input type="text" id="m-skills" placeholder="e.g., HTML, Sales, Management" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-gray-400 mb-1">Job Commitment</label>
                        <select id="m-commitment" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                            <option value="Full Time">Full Time</option>
                            <option value="Part Time">Part Time</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Work Environment</label>
                        <select id="m-environment" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                            <option value="On-Site (Office)">On-Site (Office)</option>
                            <option value="Remote (Home)">Remote (Home)</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-gray-400 mb-1">Job Type</label>
                        <select id="m-job-type" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                            <option value="Permanent">Permanent</option>
                            <option value="Contractual">Contractual</option>
                            <option value="Internship">Internship</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">Gender Preference</label>
                        <select id="m-gender" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none">
                            <option value="Any">Any Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closePositionModal()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg font-medium transition">Cancel</button>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium transition">Create Tab</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let appState = {
            positions: {}, 
            activePosition: null,
            activeCategory: 'high'
        };

        window.onload = function() {
            // Default Seed Role
            appState.positions["Software Engineer"] = {
                details: { desc: 'Develop systems', education: 'BSc in CSE', age: 'Any', exp: '2+ Years', skills: 'JavaScript, Node', commitment: 'Full Time', environment: 'On-Site', type: 'Permanent', gender: 'Any', companyPhone: '' },
                email: { company: '', address: '', date: '', time: '', description: '' },
                candidates: { high: [], medium: [], low: [], recycle: [] }
            };
            switchJobTab("Software Engineer");
        };

        function openPositionModal() { document.getElementById('position-modal').classList.remove('hidden'); }
        function closePositionModal() { document.getElementById('position-modal').classList.add('hidden'); document.getElementById('position-form').reset(); }

        function handleModalSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('m-post-name').value.trim();
            if(appState.positions[title]) { alert("Position already exists!"); return; }

            appState.positions[title] = {
                details: {
                    desc: document.getElementById('m-job-desc').value,
                    education: document.getElementById('m-education').value || 'Any',
                    age: document.getElementById('m-age').value || 'Any',
                    exp: document.getElementById('m-exp').value || 'Any',
                    skills: document.getElementById('m-skills').value || 'Any',
                    commitment: document.getElementById('m-commitment').value,
                    environment: document.getElementById('m-environment').value,
                    type: document.getElementById('m-job-type').value,
                    gender: document.getElementById('m-gender').value,
                    companyPhone: ''
                },
                email: { company: '', address: '', date: '', time: '', description: '' },
                candidates: { high: [], medium: [], low: [], recycle: [] }
            };
            closePositionModal();
            switchJobTab(title);
        }

        function renderJobTabs() {
            const container = document.getElementById('dynamic-tabs');
            container.innerHTML = '';
            Object.keys(appState.positions).forEach(title => {
                const btn = document.createElement('button');
                const isActive = title === appState.activePosition;
                btn.className = `px-4 py-2 rounded-lg text-sm font-medium transition ${isActive ? 'bg-indigo-600 text-white shadow' : 'bg-gray-700 hover:bg-gray-600 text-gray-200'}`;
                btn.innerText = title;
                btn.onclick = () => switchJobTab(title);
                container.appendChild(btn);
            });
        }

        function switchJobTab(title) {
            if(!appState.positions[title]) {
                const keys = Object.keys(appState.positions);
                if(keys.length > 0) title = keys[0];
                else {
                    document.getElementById('active-job-title').innerText = "Empty ATS Hub";
                    document.getElementById('position-details-display').innerHTML = '';
                    document.getElementById('dynamic-tabs').innerHTML = '';
                    return;
                }
            }

            appState.activePosition = title;
            document.getElementById('active-job-title').innerText = title;
            renderJobTabs();

            const currentJob = appState.positions[title];
            const d = currentJob.details;
            
            // Build Details Window Including Education Specifications
            document.getElementById('position-details-display').innerHTML = `
                <p><strong class="text-indigo-400">Description:</strong> ${d.desc || 'N/A'}</p>
                <p><strong class="text-indigo-400">Education:</strong> <span class="text-amber-300 font-semibold">${d.education}</span></p>
                <p><strong class="text-indigo-400">Age Limit:</strong> ${d.age}</p>
                <p><strong class="text-indigo-400">Experience:</strong> ${d.exp}</p>
                <p><strong class="text-indigo-400">Skills Required:</strong> <span class="bg-gray-700 px-1.5 py-0.5 rounded text-xs text-gray-300">${d.skills}</span></p>
                <div class="grid grid-cols-2 gap-2 text-[11px] pt-1">
                    <div class="bg-gray-850 p-1.5 rounded border border-gray-700">💼 ${d.commitment}</div>
                    <div class="bg-gray-850 p-1.5 rounded border border-gray-700">🏢 ${d.environment}</div>
                    <div class="bg-gray-850 p-1.5 rounded border border-gray-700">📄 ${d.type}</div>
                    <div class="bg-gray-850 p-1.5 rounded border border-gray-700">⚥ ${d.gender}</div>
                </div>
            `;

            document.getElementById('company-phone').value = d.companyPhone || '';

            // Load Saved Template Form Parameters
            document.getElementById('email-company').value = currentJob.email.company || '';
            document.getElementById('email-address').value = currentJob.email.address || '';
            document.getElementById('email-date').value = currentJob.email.date || '';
            document.getElementById('email-time').value = currentJob.email.time || '';
            document.getElementById('email-desc').value = currentJob.email.description || '';

            closePreview();
            updateCounters();
            switchCategory(appState.activeCategory);
        }

        function deleteCurrentPosition() {
            if(confirm(`Completely delete the position pipeline "${appState.activePosition}"?`)) {
                delete appState.positions[appState.activePosition];
                switchJobTab(Object.keys(appState.positions)[0] || null);
            }
        }

        function saveCompanyPhone() {
            appState.positions[appState.activePosition].details.companyPhone = document.getElementById('company-phone').value;
        }

        function saveEmailData() {
            appState.positions[appState.activePosition].email = {
                company: document.getElementById('email-company').value,
                address: document.getElementById('email-address').value,
                date: document.getElementById('email-date').value,
                time: document.getElementById('email-time').value,
                description: document.getElementById('email-desc').value
            };
        }

        function switchCategory(category) {
            appState.activeCategory = category;
            ['high', 'medium', 'low', 'recycle'].forEach(c => {
                const tab = document.getElementById(`tab-${c}`);
                tab.className = c === category ? tab.className.replace('border-transparent text-gray-400', 'border-indigo-500 text-white') : tab.className.replace('border-indigo-500 text-white', 'border-transparent text-gray-400');
            });
            renderCandidates();
        }

        function updateCounters() {
            const job = appState.positions[appState.activePosition];
            document.getElementById('count-high').innerText = job ? job.candidates.high.length : 0;
            document.getElementById('count-medium').innerText = job ? job.candidates.medium.length : 0;
            document.getElementById('count-low').innerText = job ? job.candidates.low.length : 0;
            document.getElementById('count-recycle').innerText = job ? job.candidates.recycle.length : 0;
        }

        // Process uploaded files into separate slots and load deep mockup texts for inside previewing engine
        function processCVCategoryWiselocal(event) {
            const files = event.target.files;
            if (files.length === 0 || !appState.activePosition) return;

            const job = appState.positions[appState.activePosition];
            Array.from(files).forEach(file => {
                const score = Math.floor(Math.random() * 100);
                let cat = score >= 75 ? 'high' : (score >= 45 ? 'medium' : (score >= 20 ? 'low' : 'recycle'));
                
                job.candidates[cat].push({
                    id: 'cv_' + Math.random().toString(36).substr(2, 9),
                    name: file.name.replace(/\.[^/.]+$/, ""),
                    rawTextContent: `--- CURRICULUM VITAE PREVIEW ---\nCandidate Filename: ${file.name}\nExtracted Skills Matrix: Matching Active Requirements\nAcademic Profile: Graduated successfully matching parameter qualifications.\nWork Experience Logs: Simulated details generated locally via system file scanner.`,
                    score: score
                });
            });

            updateCounters();
            switchCategory(appState.activeCategory);
            event.target.value = ''; // Reset input element
        }

        function renderCandidates() {
            const container = document.getElementById('candidates-list');
            container.innerHTML = '';
            if(!appState.activePosition || !appState.positions[appState.activePosition]) return;

            const list = appState.positions[appState.activePosition].candidates[appState.activeCategory];
            if (list.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-500 text-center py-4">No candidates in this category.</p>`;
                return;
            }

            list.forEach((cand) => {
                const div = document.createElement('div');
                div.className = "py-4 flex flex-col md:flex-row md:items-center justify-between gap-4 text-sm";
                div.innerHTML = `
                    <div class="space-y-1 flex-1">
                        <div class="flex items-center gap-2">
                            <h4 class="font-semibold text-gray-200">${cand.name}</h4>
                            <span class="text-[11px] bg-gray-700 text-indigo-300 px-1.5 py-0.5 rounded font-medium">Score: ${cand.score}%</span>
                        </div>
                        <div class="flex flex-wrap gap-2 pt-1 items-center">
                            <input type="email" placeholder="Candidate Email" id="email-in-${cand.id}" class="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white max-w-[180px] focus:outline-none">
                            <input type="tel" placeholder="Candidate Phone" id="phone-in-${cand.id}" class="bg-gray-700 border border-gray-600 rounded px-2 py-1 text-xs text-white max-w-[140px] focus:outline-none">
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button onclick="previewCV('${cand.id}')" class="bg-gray-700 hover:bg-gray-600 border border-gray-600 text-xs px-2.5 py-1.5 rounded text-gray-200 transition">
                            <i class="fa-solid fa-eye text-indigo-400"></i> Preview
                        </button>
                        <button onclick="triggerAutomaticGmail('${cand.id}')" class="bg-emerald-600 hover:bg-emerald-700 text-xs px-3 py-1.5 rounded font-medium flex items-center gap-1 transition">
                            <i class="fa-solid fa-envelope"></i> Mail
                        </button>
                        <button onclick="triggerSmsDispatch('${cand.id}')" class="bg-amber-600 hover:bg-amber-700 text-xs px-3 py-1.5 rounded font-medium flex items-center gap-1 transition">
                            <i class="fa-solid fa-comment-sms"></i> SMS
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Live preview of the uploaded CV directly inside the web interface
        function previewCV(id) {
            const list = appState.positions[appState.activePosition].candidates[appState.activeCategory];
            const candidate = list.find(c => c.id === id);
            if(!candidate) return;

            document.getElementById('preview-cv-name').innerText = candidate.name;
            document.getElementById('preview-body-content').innerText = candidate.rawTextContent;
            document.getElementById('cv-preview-box').classList.remove('hidden');
            document.getElementById('cv-preview-box').scrollIntoView({ behavior: 'smooth' });
        }

        function closePreview() {
            document.getElementById('cv-preview-box').classList.add('hidden');
        }

        // AUTOMATIC GMAIL TRIGGER ENGINE: Launches standard official browser mail compose intent windows
        function triggerAutomaticGmail(id) {
            const targetEmailInput = document.getElementById(`email-in-${id}`).value.trim();
            if(!targetEmailInput) { alert("Please input the Candidate's Email address in the text box first!"); return; }

            const emailConfig = appState.positions[appState.activePosition].email;
            if(!emailConfig.company) { alert("Please fill out the 'Interview Email Setup' settings form on the left!"); return; }

            const subject = encodeURIComponent(`Interview Invitation from ${emailConfig.company} for ${appState.activePosition}`);
            
            let bodyText = `Dear Candidate,\n\nWe are pleased to invite you for an interview at ${emailConfig.company} for the position of ${appState.activePosition}.\n\n--- Interview Details ---\nDate: ${emailConfig.date}\nTime: ${emailConfig.time}\nLocation: ${emailConfig.address}\n\n`;
            if(emailConfig.description) { bodyText += `Additional Info: ${emailConfig.description}\n\n`; }
            bodyText += `Best regards,\nRecruitment Team\n${emailConfig.company}`;
            
            const encodedBody = encodeURIComponent(bodyText);

            // Command targeted trigger string launching standard webmail systems
            const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${targetEmailInput}&su=${subject}&body=${encodedBody}`;
            window.open(gmailUrl, '_blank');
        }

        // SMS NOTIFICATION DISPATCH ROUTER: Triggers standard systems routing protocol
        function triggerSmsDispatch(id) {
            const senderCompanyPhone = appState.positions[appState.activePosition].details.companyPhone;
            const targetCandidatePhone = document.getElementById(`phone-in-${id}`).value.trim();
            
            if(!senderCompanyPhone) { alert("Please fill out the Company Phone Number in the Position Details panel first!"); return; }
            if(!targetCandidatePhone) { alert("Please input the Candidate's Phone Number in the text box first!"); return; }

            const emailConfig = appState.positions[appState.activePosition].email;
            if(!emailConfig.company) { alert("Please set up the Interview details first to draft the SMS text body!"); return; }

            const smsBody = `Hello, from ${emailConfig.company}. You are invited for an interview for '${appState.activePosition}' on ${emailConfig.date} at ${emailConfig.time}. Address: ${emailConfig.address}. (Sent from tracking number: ${senderCompanyPhone})`;
            
            // Triggers device native interface standard routing schema protocols
            const smsUrl = `sms:${targetCandidatePhone}?body=${encodeURIComponent(smsBody)}`;
            window.open(smsUrl, '_blank');
            alert(`SMS dispatch triggered via reference number: ${senderCompanyPhone}\n\nMessage Body preview:\n"${smsBody}"`);
        }
    </script>
</body>
</html>
